<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: transparent;
        color: #111827;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      #root {
        width: 100%;
        min-height: 640px;
      }

      .panel {
        border: 1px solid #d1d5db;
        border-radius: 8px;
        background: #ffffff;
        overflow: hidden;
      }

      .toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        min-height: 38px;
        padding: 8px 12px;
        border-bottom: 1px solid #e5e7eb;
        font-size: 13px;
      }

      .legend {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 10px;
      }

      .legend-item {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        white-space: nowrap;
      }

      .legend-swatch {
        width: 18px;
        height: 3px;
        border-radius: 999px;
        background: #6b7280;
      }

      .hint {
        color: #4b5563;
        white-space: nowrap;
      }

      svg {
        display: block;
        width: 100%;
        height: 590px;
        cursor: crosshair;
        user-select: none;
      }

      .grid {
        stroke: #e5e7eb;
        stroke-width: 1;
      }

      .axis-text {
        fill: #4b5563;
        font-size: 12px;
      }

      .wick {
        stroke-width: 1.2;
      }

      .body {
        stroke-width: 1;
      }

      .line {
        fill: none;
        stroke-width: 1.6;
      }

      .bb-line {
        fill: none;
        stroke-width: 1;
        stroke-dasharray: 4 4;
      }

      .neckline {
        stroke-width: 2;
        stroke-dasharray: 7 5;
      }

      .neckline-label {
        font-size: 12px;
        font-weight: 700;
        paint-order: stroke;
        stroke: #ffffff;
        stroke-width: 3;
      }

      .cursor-line {
        stroke: #111827;
        stroke-width: 1.2;
        stroke-dasharray: 4 4;
        pointer-events: none;
      }

      .cursor-box {
        fill: #111827;
        pointer-events: none;
      }

      .cursor-text {
        fill: #ffffff;
        font-size: 12px;
        font-weight: 700;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      const Streamlit = {
        setComponentReady: () => {
          window.parent.postMessage({ type: "streamlit:componentReady", apiVersion: 1 }, "*");
        },
        setFrameHeight: (height) => {
          window.parent.postMessage({ type: "streamlit:setFrameHeight", height }, "*");
        },
        setComponentValue: (value) => {
          window.parent.postMessage({ type: "streamlit:setComponentValue", value }, "*");
        },
      };

      const root = document.getElementById("root");
      const yenFormatter = new Intl.NumberFormat("ja-JP", {
        maximumFractionDigits: 0,
      });
      const numberFormatter = new Intl.NumberFormat("ja-JP", {
        maximumFractionDigits: 0,
      });

      function yen(value) {
        return `${yenFormatter.format(Math.round(value))}円`;
      }

      function number(value) {
        return numberFormatter.format(Math.round(value));
      }

      function asNumber(value) {
        if (value === null || value === undefined || value === "") return null;
        const parsed = Number(value);
        return Number.isFinite(parsed) ? parsed : null;
      }

      function render(args) {
        const records = (args.records || []).map((row) => ({
          date: row.date,
          open: asNumber(row.open),
          high: asNumber(row.high),
          low: asNumber(row.low),
          close: asNumber(row.close),
          volume: asNumber(row.volume),
          ma_5: asNumber(row.ma_5),
          ma_25: asNumber(row.ma_25),
          ma_75: asNumber(row.ma_75),
          bb_upper_1: asNumber(row.bb_upper_1),
          bb_lower_1: asNumber(row.bb_lower_1),
          bb_upper_2: asNumber(row.bb_upper_2),
          bb_lower_2: asNumber(row.bb_lower_2),
          bb_upper_3: asNumber(row.bb_upper_3),
          bb_lower_3: asNumber(row.bb_lower_3),
        }));
        const show = args.show || {};
        const necklines = args.necklines || [];
        const selectedLabel = args.label || "ネックライン";
        const selectedColor = args.color || "#7c3aed";

        root.innerHTML = "";
        const panel = document.createElement("div");
        panel.className = "panel";
        const toolbar = document.createElement("div");
        toolbar.className = "toolbar";
        const legend = document.createElement("div");
        legend.className = "legend";
        toolbar.appendChild(legend);

        const hint = document.createElement("div");
        hint.className = "hint";
        hint.textContent = "チャート上の価格をクリック";
        toolbar.appendChild(hint);
        panel.appendChild(toolbar);

        const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
        const width = 1200;
        const height = 590;
        const margin = { top: 26, right: 112, bottom: 42, left: 72 };
        const plot = {
          left: margin.left,
          top: margin.top,
          width: width - margin.left - margin.right,
          height: height - margin.top - margin.bottom,
        };
        svg.setAttribute("viewBox", `0 0 ${width} ${height}`);
        panel.appendChild(svg);
        root.appendChild(panel);

        if (!records.length) {
          addText(svg, width / 2, height / 2, "表示できる日足データがありません", "axis-text", "middle");
          Streamlit.setFrameHeight(640);
          return;
        }

        const values = [];
        records.forEach((row) => {
          ["high", "low"].forEach((key) => {
            const value = row[key];
            if (value !== null) values.push(value);
          });
          if (show.daily_ma) {
            ["ma_5", "ma_25", "ma_75"].forEach((key) => {
              const value = row[key];
              if (value !== null) values.push(value);
            });
          }
          if (show.bollinger) {
            [
              "bb_upper_1",
              "bb_lower_1",
              "bb_upper_2",
              "bb_lower_2",
              "bb_upper_3",
              "bb_lower_3",
            ].forEach((key) => {
              const value = row[key];
              if (value !== null) values.push(value);
            });
          }
        });
        necklines.forEach((line) => {
          const price = asNumber(line.price);
          if (price !== null) values.push(price);
        });

        let minPrice = Math.min(...values);
        let maxPrice = Math.max(...values);
        if (minPrice === maxPrice) {
          const padding = Math.max(Math.abs(minPrice) * 0.01, 1);
          minPrice -= padding;
          maxPrice += padding;
        } else {
          const padding = (maxPrice - minPrice) * 0.08;
          minPrice -= padding;
          maxPrice += padding;
        }

        const x = (index) => {
          if (records.length === 1) return plot.left + plot.width / 2;
          return plot.left + (index / (records.length - 1)) * plot.width;
        };
        const y = (price) => plot.top + ((maxPrice - price) / (maxPrice - minPrice)) * plot.height;
        const yToPrice = (position) => maxPrice - ((position - plot.top) / plot.height) * (maxPrice - minPrice);
        const candleWidth = Math.max(3, Math.min(12, (plot.width / Math.max(records.length, 1)) * 0.55));

        drawGrid(svg, records, plot, x, y, minPrice, maxPrice);
        drawCandles(svg, records, x, y, candleWidth);

        if (show.daily_ma) {
          addLegend(legend, "#2563eb", "移動平均5");
          addLegend(legend, "#0891b2", "移動平均25");
          addLegend(legend, "#7c3aed", "移動平均75");
          drawSeries(svg, records, "ma_5", x, y, "#2563eb", "line");
          drawSeries(svg, records, "ma_25", x, y, "#0891b2", "line");
          drawSeries(svg, records, "ma_75", x, y, "#7c3aed", "line");
        }

        if (show.bollinger) {
          addLegend(legend, "#f59e0b", "ボリンジャー");
          [
            "bb_upper_1",
            "bb_lower_1",
            "bb_upper_2",
            "bb_lower_2",
            "bb_upper_3",
            "bb_lower_3",
          ].forEach((key) => drawSeries(svg, records, key, x, y, "#f59e0b", "bb-line"));
        }

        necklines.forEach((line) => {
          const price = asNumber(line.price);
          if (price === null) return;
          const lineY = y(price);
          const color = line.color || "#7c3aed";
          addLine(svg, plot.left, lineY, plot.left + plot.width, lineY, "neckline", color);
          addText(
            svg,
            plot.left + plot.width + 8,
            lineY - 5,
            `${line.label || "ネックライン"} ${yen(price)}`,
            "neckline-label",
            "start",
            color,
          );
        });

        const cursor = addLine(svg, plot.left, plot.top, plot.left + plot.width, plot.top, "cursor-line", "#111827");
        const cursorBox = addRect(svg, plot.left + plot.width + 8, plot.top - 13, 92, 22, "cursor-box", "#111827");
        const cursorText = addText(svg, plot.left + plot.width + 14, plot.top + 2, "", "cursor-text", "start");
        [cursor, cursorBox, cursorText].forEach((element) => element.setAttribute("visibility", "hidden"));

        svg.addEventListener("mousemove", (event) => {
          const point = pointerPosition(svg, event, width, height);
          if (!insidePlot(point, plot)) {
            [cursor, cursorBox, cursorText].forEach((element) => element.setAttribute("visibility", "hidden"));
            return;
          }
          const price = yToPrice(point.y);
          cursor.setAttribute("y1", point.y);
          cursor.setAttribute("y2", point.y);
          cursorBox.setAttribute("y", point.y - 14);
          cursorText.setAttribute("y", point.y + 2);
          cursorText.textContent = yen(price);
          [cursor, cursorBox, cursorText].forEach((element) => element.setAttribute("visibility", "visible"));
        });

        svg.addEventListener("mouseleave", () => {
          [cursor, cursorBox, cursorText].forEach((element) => element.setAttribute("visibility", "hidden"));
        });

        svg.addEventListener("click", (event) => {
          const point = pointerPosition(svg, event, width, height);
          if (!insidePlot(point, plot)) return;
          const price = Math.round(yToPrice(point.y));
          Streamlit.setComponentValue({
            price,
            label: selectedLabel,
            color: selectedColor,
            nonce: `${Date.now()}-${price}`,
          });
        });

        Streamlit.setFrameHeight(640);
      }

      function drawGrid(svg, records, plot, x, y, minPrice, maxPrice) {
        for (let i = 0; i <= 5; i += 1) {
          const price = minPrice + ((maxPrice - minPrice) * i) / 5;
          const lineY = y(price);
          addLine(svg, plot.left, lineY, plot.left + plot.width, lineY, "grid", "#e5e7eb");
          addText(svg, plot.left + plot.width + 8, lineY + 4, yen(price), "axis-text", "start");
        }

        const stride = Math.max(1, Math.floor(records.length / 7));
        records.forEach((row, index) => {
          if (index % stride !== 0 && index !== records.length - 1) return;
          const tickX = x(index);
          addLine(svg, tickX, plot.top, tickX, plot.top + plot.height, "grid", "#f3f4f6");
          addText(svg, tickX, plot.top + plot.height + 22, row.date.slice(5), "axis-text", "middle");
        });
      }

      function drawCandles(svg, records, x, y, candleWidth) {
        records.forEach((row, index) => {
          const isUp = row.close >= row.open;
          const color = isUp ? "#059669" : "#dc2626";
          const center = x(index);
          addLine(svg, center, y(row.high), center, y(row.low), "wick", color);
          const bodyTop = y(Math.max(row.open, row.close));
          const bodyBottom = y(Math.min(row.open, row.close));
          addRect(
            svg,
            center - candleWidth / 2,
            bodyTop,
            candleWidth,
            Math.max(bodyBottom - bodyTop, 1),
            "body",
            isUp ? "#ffffff" : color,
            color,
          );
        });
      }

      function drawSeries(svg, records, key, x, y, color, className) {
        const points = records
          .map((row, index) => ({ index, value: row[key] }))
          .filter((point) => point.value !== null);
        if (points.length < 2) return;
        const path = points
          .map((point, index) => `${index === 0 ? "M" : "L"} ${x(point.index).toFixed(2)} ${y(point.value).toFixed(2)}`)
          .join(" ");
        const element = document.createElementNS("http://www.w3.org/2000/svg", "path");
        element.setAttribute("d", path);
        element.setAttribute("class", className);
        element.setAttribute("stroke", color);
        svg.appendChild(element);
      }

      function addLegend(container, color, label) {
        const item = document.createElement("span");
        item.className = "legend-item";
        const swatch = document.createElement("span");
        swatch.className = "legend-swatch";
        swatch.style.background = color;
        item.appendChild(swatch);
        item.appendChild(document.createTextNode(label));
        container.appendChild(item);
      }

      function addLine(svg, x1, y1, x2, y2, className, color) {
        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
        line.setAttribute("x1", x1);
        line.setAttribute("y1", y1);
        line.setAttribute("x2", x2);
        line.setAttribute("y2", y2);
        line.setAttribute("class", className);
        line.setAttribute("stroke", color);
        svg.appendChild(line);
        return line;
      }

      function addRect(svg, x, y, width, height, className, fill, stroke = null) {
        const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
        rect.setAttribute("x", x);
        rect.setAttribute("y", y);
        rect.setAttribute("width", width);
        rect.setAttribute("height", height);
        rect.setAttribute("class", className);
        rect.setAttribute("fill", fill);
        if (stroke) rect.setAttribute("stroke", stroke);
        svg.appendChild(rect);
        return rect;
      }

      function addText(svg, x, y, text, className, anchor, fill = null) {
        const element = document.createElementNS("http://www.w3.org/2000/svg", "text");
        element.setAttribute("x", x);
        element.setAttribute("y", y);
        element.setAttribute("class", className);
        element.setAttribute("text-anchor", anchor);
        if (fill) element.setAttribute("fill", fill);
        element.textContent = text;
        svg.appendChild(element);
        return element;
      }

      function pointerPosition(svg, event, width, height) {
        const rect = svg.getBoundingClientRect();
        return {
          x: ((event.clientX - rect.left) / rect.width) * width,
          y: ((event.clientY - rect.top) / rect.height) * height,
        };
      }

      function insidePlot(point, plot) {
        return (
          point.x >= plot.left &&
          point.x <= plot.left + plot.width &&
          point.y >= plot.top &&
          point.y <= plot.top + plot.height
        );
      }

      window.addEventListener("message", (event) => {
        if (!event.data || event.data.type !== "streamlit:render") return;
        render(event.data.args || {});
      });

      Streamlit.setComponentReady();
      Streamlit.setFrameHeight(640);
    </script>
  </body>
</html>
